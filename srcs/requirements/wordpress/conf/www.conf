# This is the configuration for a pool of PHP-FPM processes.
[www]

# The user and group the processes will run as.
user = www-data
group = www-data

# This is the most important change from the default configuration.
# Instead of listening on a Unix socket (e.g., /run/php/php7.4-fpm.sock),
# it listens on TCP port 9000 on all interfaces.
# This allows the NGINX container to connect to it over the Docker network.
listen = 9000

# Permissions for the listening socket (if it were a Unix socket).
listen.owner = www-data
listen.group = www-data

# Process Manager settings.
# 'dynamic' means the number of child processes is set dynamically based on the following directives.
pm = dynamic
pm.max_children = 5
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3

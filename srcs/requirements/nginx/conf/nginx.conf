# Defines a server block for handling incoming requests.
server {
    # Listen on port 443 for both IPv4 and IPv6 connections, and enable SSL.
    listen 443 ssl;
    listen [::]:443 ssl;

    # The domain name this server block responds to.
    server_name jowander.42.fr;

    # --- SSL/TLS Configuration ---
    # Path to the self-signed SSL certificate.
    ssl_certificate /etc/ssl/certs/nginx-selfsigned.crt;
    # Path to the private key for the certificate.
    ssl_certificate_key /etc/ssl/private/nginx-selfsigned.key;
    # Specifies the allowed TLS protocols. Only modern, secure versions are enabled.
    ssl_protocols TLSv1.2 TLSv1.3;

    # --- Document Root and Index ---
    # The root directory for website files. This is the same directory mounted in the WordPress container.
    root /var/www/html;
    # Specifies the default file to serve if a directory is requested.
    index index.php;

    # --- Location Blocks ---
    # This block handles general requests.
    location / {
        # Tries to serve the requested file ($uri), then a directory ($uri/),
        # and if neither exists, returns a 404 error.
        # This is standard for WordPress to handle permalinks.
        try_files $uri $uri/ /index.php?$args;
    }

    # This block handles requests for files ending in .php.
    location ~ \.php$ {
        # Include the standard FastCGI configuration snippets provided by NGINX.
        include snippets/fastcgi-php.conf;
        # Forward the request to the PHP-FPM service.
        # 'wordpress:9000' is the hostname (service name from docker-compose) and port
        # where the PHP-FPM container is listening.
        fastcgi_pass wordpress:9000;
    }
}
